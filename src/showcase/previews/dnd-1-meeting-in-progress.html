<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting in Progress — Do Not Disturb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #06060f;
      color: #f0f0f0;
    }
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #06060f;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .badge {
      position: fixed;
      top: 24px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(58, 134, 255, 0.1);
      border: 1px solid rgba(58, 134, 255, 0.3);
      border-radius: 20px;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #3a86ff;
    }
    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #3a86ff;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    .card {
      width: min(440px, 88vw);
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      animation: breathe-glow 4s ease-in-out infinite;
    }
    .mic-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid #3a86ff;
      margin: 0 auto;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mic-icon::after {
      content: '';
      position: absolute;
      width: 44px;
      height: 4px;
      background: #3a86ff;
      transform: rotate(45deg);
      border-radius: 2px;
    }
    .mic-body {
      width: 20px;
      height: 28px;
      background: rgba(58, 134, 255, 0.3);
      border: 2px solid #3a86ff;
      border-radius: 10px;
    }
    .heading {
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 24px;
    }
    .subheading {
      font-size: 0.75rem;
      color: #9ca3af;
      max-width: 320px;
      margin: 12px auto 0;
      line-height: 1.6;
    }
    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 24px 0;
    }
    .clock-label {
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #9ca3af;
    }
    .clock-time {
      display: block;
      font-size: 2rem;
      font-weight: 700;
      color: #f59e0b;
      font-variant-numeric: tabular-nums;
      margin: 8px 0;
    }
    .clock-tz {
      font-size: 0.55rem;
      color: #9ca3af;
    }
    @keyframes breathe-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(58, 134, 255, 0.05), inset 0 0 20px rgba(58, 134, 255, 0.02); }
      50% { box-shadow: 0 0 40px rgba(58, 134, 255, 0.15), inset 0 0 30px rgba(58, 134, 255, 0.05); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @media (prefers-reduced-motion: reduce) {
      .dot, .card { animation: none; }
      .card { box-shadow: 0 0 20px rgba(58, 134, 255, 0.05); }
    }
    @media (max-width: 600px) {
      .card { padding: 32px 24px; }
      .badge { top: 16px; right: 16px; }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="badge">
      <span class="dot"></span>
      Meeting in Progress
    </div>
    <div class="card">
      <div class="mic-icon">
        <div class="mic-body"></div>
      </div>
      <div class="heading">Meeting in Progress</div>
      <div class="subheading">The dashboard is temporarily hidden during this meeting.</div>
      <div class="divider"></div>
      <div class="clock-label">Current Time (PST)</div>
      <span class="clock-time" id="focusClock">--:--:--</span>
      <div class="clock-tz">Pacific Standard Time</div>
    </div>
  </div>

  <script>
    (function() {
      function updateClock() {
        var now = new Date();
        var time = now.toLocaleString('en-US', { timeZone: 'America/Los_Angeles', hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('focusClock').textContent = time;
      }
      updateClock();
      setInterval(updateClock, 1000);
    })();
  </script>
</body>
</html>
