<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Rain -- 404</title>
  <style>
    @font-face {
      font-family: 'Space Grotesk';
      font-style: normal;
      font-weight: 300 700;
      font-display: swap;
      src: url('/fonts/space-grotesk-latin.woff2') format('woff2');
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #06060f;
      font-family: 'Space Grotesk', sans-serif;
      color: #f0f0f0;
    }

    #rain-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .datastream-text {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      font-weight: 500;
      color: rgba(6, 214, 160, 0.5);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      white-space: nowrap;
      pointer-events: none;
      z-index: 10;
    }

    .return-link {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #06d6a0;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s;
      z-index: 100;
      white-space: nowrap;
    }
    .return-link:hover { opacity: 1; }
    .return-link:focus {
      outline: 1px solid #06d6a0;
      outline-offset: 4px;
      opacity: 1;
    }

    /* Reduced motion: hide canvas, show static fallback */
    .static-fallback {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      background: #06060f;
    }
    .static-404 {
      font-family: monospace;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 700;
      color: #06d6a0;
      letter-spacing: 0.2em;
      text-shadow: 0 0 20px rgba(6, 214, 160, 0.6);
      line-height: 1;
    }
    .static-label {
      font-size: 0.7rem;
      color: rgba(6, 214, 160, 0.5);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    @media (prefers-reduced-motion: reduce) {
      #rain-canvas { display: none; }
      .datastream-text { display: none; }
      .static-fallback { display: flex; }
    }
  </style>
</head>
<body>
  <canvas id="rain-canvas" aria-hidden="true">
    <span>404 - Page not found</span>
  </canvas>

  <div class="datastream-text" aria-live="off" aria-hidden="true">YOU ARE LOST IN THE DATASTREAM</div>

  <!-- Static fallback for prefers-reduced-motion -->
  <div class="static-fallback" role="main">
    <div class="static-404" aria-label="Error 404">404</div>
    <div class="static-label">YOU ARE LOST IN THE DATASTREAM</div>
  </div>

  <a href="/" class="return-link">Return to Dashboard</a>

  <script>
    (function() {
      var canvas = document.getElementById('rain-canvas');
      if (!canvas) { return; }
      var ctx = canvas.getContext('2d');

      // Character set: half-width katakana + digits + select latin caps
      var KATAKANA = '\uff66\uff67\uff68\uff69\uff6a\uff6b\uff6c\uff6d\uff6e\uff6f\uff70\uff71\uff72\uff73\uff74\uff75\uff76\uff77\uff78\uff79\uff7a\uff7b\uff7c\uff7d\uff7e\uff7f\uff80\uff81\uff82\uff83\uff84\uff85\uff86\uff87\uff88\uff89\uff8a\uff8b\uff8c\uff8d\uff8e\uff8f\uff90\uff91\uff92\uff93\uff94\uff95\uff96\uff97\uff98\uff99\uff9a\uff9b\uff9c\uff9d';
      var DIGITS = '0123456789';
      var LATIN = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
      var CHARS = KATAKANA + DIGITS + LATIN;

      var FONT_SIZE = 14;
      var TRAIL_LENGTH = 20;
      var TARGET_FPS = 30;
      var FRAME_INTERVAL = 1000 / TARGET_FPS;

      // Colors
      var COLOR_HEAD = 'rgba(6,214,160,1.0)';
      var COLOR_BRIGHT = 'rgba(6,214,160,0.8)';
      var COLOR_MID = 'rgba(6,214,160,0.4)';
      var COLOR_FADE = 'rgba(6,214,160,0.1)';
      var BG_FADE = 'rgba(6,6,15,0.05)';

      // "404" pixel grid definition
      // Each character in the 404 formation is defined by column index.
      // Grid: 5 rows high, widths: 4 wide + 1 gap + 3 wide + 1 gap + 4 wide
      // Total grid width: ~13 cols, height: ~7 rows (using font cells)
      // We define the ON pixels for "404" in a compact bitmap
      // Using a 5-tall, 13-wide grid (cols 0-12):
      // "4" (cols 0-3): 1100 / 1100 / 1111 / 0001 / 0001
      // "0" (cols 5-8): 0110 / 1001 / 1001 / 1001 / 0110
      // "4" (cols 10-13): 1100 / 1100 / 1111 / 0001 / 0001
      // We store as array of [col, row] pairs (0-indexed)
      var GRID_COLS = 14;
      var GRID_ROWS = 5;

      var FORMATION_PIXELS = (function() {
        var pixels = [];
        // "4" left (cols 0-3, rows 0-4)
        var four_left = [
          [0,0],[1,0],
          [0,1],[1,1],
          [0,2],[1,2],[2,2],[3,2],
          [3,3],
          [3,4]
        ];
        // "0" (cols 5-8, rows 0-4)
        var zero = [
          [5,0],[6,0],[7,0],
          [5,1],[8,1],
          [5,2],[8,2],
          [5,3],[8,3],
          [5,4],[6,4],[7,4]
        ];
        // "4" right (cols 10-13, rows 0-4)
        var four_right = [
          [10,0],[11,0],
          [10,1],[11,1],
          [10,2],[11,2],[12,2],[13,2],
          [13,3],
          [13,4]
        ];
        var i;
        for (i = 0; i < four_left.length; i++) { pixels.push(four_left[i]); }
        for (i = 0; i < zero.length; i++) { pixels.push(zero[i]); }
        for (i = 0; i < four_right.length; i++) { pixels.push(four_right[i]); }
        return pixels;
      }());

      var columns = [];
      var numCols = 0;
      var numRows = 0;
      var lastTime = 0;
      var resizeTimer = null;

      // Formation state
      var FORMATION_INTERVAL = 8000; // ms between formations
      var FORMATION_HOLD = 2000;     // ms to hold formation
      var formationTimer = 0;
      var inFormation = false;
      var formationStart = 0;

      // Map from column index -> target row during formation (or -1)
      var formationTargets = {};
      // Pixel set for quick lookup
      var formationSet = {};

      function randomChar() {
        return CHARS.charAt(Math.floor(Math.random() * CHARS.length));
      }

      function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function initFormationSet() {
        formationSet = {};
        var i, px;
        for (i = 0; i < FORMATION_PIXELS.length; i++) {
          px = FORMATION_PIXELS[i];
          formationSet[px[0] + ',' + px[1]] = true;
        }
      }

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        numCols = Math.floor(canvas.width / FONT_SIZE);
        numRows = Math.floor(canvas.height / FONT_SIZE);

        // Rebuild columns preserving state where possible
        var newCols = [];
        var i;
        for (i = 0; i < numCols; i++) {
          if (columns[i]) {
            newCols.push(columns[i]);
          } else {
            newCols.push({
              x: i * FONT_SIZE,
              y: randomInt(-numRows, 0) * FONT_SIZE,
              speed: randomInt(1, 3),
              trail: []
            });
          }
        }
        columns = newCols;

        // Recompute formation targets based on new dimensions
        computeFormationTargets();
      }

      function computeFormationTargets() {
        // Center the 14-col x 5-row 404 grid in the canvas
        var gridPixelW = GRID_COLS * FONT_SIZE;
        var gridPixelH = GRID_ROWS * FONT_SIZE;
        var offsetCol = Math.floor((numCols - GRID_COLS) / 2);
        var offsetRow = Math.floor((numRows - GRID_ROWS) / 2);

        formationTargets = {};
        var i, px, col, row;
        for (i = 0; i < FORMATION_PIXELS.length; i++) {
          px = FORMATION_PIXELS[i];
          col = offsetCol + px[0];
          row = offsetRow + px[1];
          if (!formationTargets[col]) {
            formationTargets[col] = [];
          }
          formationTargets[col].push(row);
        }
      }

      function drawFrame(ts) {
        var elapsed = ts - lastTime;
        if (elapsed < FRAME_INTERVAL) {
          requestAnimationFrame(drawFrame);
          return;
        }
        lastTime = ts - (elapsed % FRAME_INTERVAL);

        // Formation state machine
        formationTimer += elapsed;
        if (!inFormation && formationTimer >= FORMATION_INTERVAL) {
          inFormation = true;
          formationStart = ts;
          formationTimer = 0;
        }
        if (inFormation && (ts - formationStart) >= FORMATION_HOLD) {
          inFormation = false;
          formationTimer = 0;
        }

        // Fade background slightly each frame to create trails
        ctx.fillStyle = BG_FADE;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.font = FONT_SIZE + 'px monospace';
        ctx.textAlign = 'left';

        var i, col, targets, targetRow, atTarget, ch, brightness, trailLen, t, alpha;

        for (i = 0; i < columns.length; i++) {
          col = columns[i];
          var colIndex = Math.floor(col.x / FONT_SIZE);

          // Determine if this column has a formation target
          targets = formationTargets[colIndex];
          targetRow = (targets && targets.length > 0) ? targets[0] : -1;
          atTarget = false;

          if (inFormation && targetRow >= 0) {
            var targetY = targetRow * FONT_SIZE;
            // Slow column down as it approaches target
            if (col.y >= targetY - FONT_SIZE && col.y <= targetY + FONT_SIZE) {
              // Lock at target
              col.y = targetY;
              atTarget = true;
            }
          }

          // Draw head character (brightest)
          ch = randomChar();
          ctx.fillStyle = COLOR_HEAD;
          if (atTarget) {
            // Draw formation character in bright white-green
            ctx.fillStyle = 'rgba(180,255,220,1.0)';
          }
          ctx.fillText(ch, col.x, col.y);

          // Draw trail (fading behind)
          trailLen = randomInt(12, TRAIL_LENGTH);
          for (t = 1; t <= trailLen; t++) {
            alpha = (1 - t / trailLen);
            if (alpha <= 0) { break; }
            if (t === 1) {
              ctx.fillStyle = COLOR_BRIGHT;
            } else if (t < 5) {
              ctx.fillStyle = COLOR_MID;
            } else {
              ctx.fillStyle = COLOR_FADE;
            }
            ctx.fillText(randomChar(), col.x, col.y - t * FONT_SIZE);
          }

          // Advance column (skip if locked at formation target)
          if (!atTarget) {
            col.y += col.speed * FONT_SIZE;
          }

          // Reset when column goes off screen
          if (col.y > canvas.height + TRAIL_LENGTH * FONT_SIZE) {
            col.y = randomInt(-5, 0) * FONT_SIZE;
            col.speed = randomInt(1, 3);
          }
        }

        requestAnimationFrame(drawFrame);
      }

      function onResize() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(resize, 200);
      }

      // Init
      initFormationSet();
      resize();
      requestAnimationFrame(drawFrame);
      window.addEventListener('resize', onResize);
    })();
  </script>
</body>
</html>
