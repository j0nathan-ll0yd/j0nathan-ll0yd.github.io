<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Away — Do Not Disturb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #06060f;
      color: #f0f0f0;
      background-image: radial-gradient(ellipse at 50% 40%, rgba(129, 140, 248, 0.08), #06060f 70%);
    }
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .badge {
      position: fixed;
      top: 24px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(129, 140, 248, 0.1);
      border: 1px solid rgba(129, 140, 248, 0.3);
      border-radius: 20px;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #818cf8;
    }
    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #818cf8;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      opacity: 0;
      animation: fade-in 1.5s ease forwards;
    }
    .glass-circle {
      width: 120px;
      height: 120px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lock-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .lock-shackle {
      width: 18px;
      height: 14px;
      border: 3px solid #818cf8;
      border-radius: 9px 9px 0 0;
      border-bottom: none;
    }
    .lock-body {
      width: 24px;
      height: 20px;
      border: 3px solid #818cf8;
      border-radius: 4px;
    }
    .heading {
      font-size: 2.5rem;
      font-weight: 700;
      margin-top: 32px;
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subheading {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-top: 12px;
    }
    .clock-time {
      font-size: 3rem;
      font-weight: 700;
      color: #f59e0b;
      font-variant-numeric: tabular-nums;
      margin-top: 32px;
    }
    .clock-tz {
      font-size: 0.55rem;
      color: #9ca3af;
      margin-top: 6px;
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @media (prefers-reduced-motion: reduce) {
      .dot { animation: none; }
      .content { opacity: 1; animation: none; }
    }
    @media (max-width: 600px) {
      .glass-circle { width: 100px; height: 100px; }
      .heading { font-size: 2rem; }
      .clock-time { font-size: 2.5rem; }
      .badge { top: 16px; right: 16px; }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="badge">
      <span class="dot"></span>
      Away
    </div>
    <div class="content">
      <div class="glass-circle">
        <div class="lock-wrap">
          <div class="lock-shackle"></div>
          <div class="lock-body"></div>
        </div>
      </div>
      <div class="heading">Away</div>
      <div class="subheading">Jonathan is away. Check back soon.</div>
      <div class="clock-time" id="focusClock">--:--:--</div>
      <div class="clock-tz">Pacific Standard Time</div>
    </div>
  </div>

  <script>
    (function() {
      function updateClock() {
        var now = new Date();
        var time = now.toLocaleString('en-US', { timeZone: 'America/Los_Angeles', hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('focusClock').textContent = time;
      }
      updateClock();
      setInterval(updateClock, 1000);
    })();
  </script>
</body>
</html>
