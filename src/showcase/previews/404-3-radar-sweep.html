<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar Sweep -- 404</title>
  <style>
    @font-face {
      font-family: 'Space Grotesk';
      font-style: normal;
      font-weight: 300 700;
      font-display: swap;
      src: url('/fonts/space-grotesk-latin.woff2') format('woff2');
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #06060f;
      font-family: 'Space Grotesk', sans-serif;
      color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
    }

    .radar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .radar-svg {
      width: clamp(240px, 50vw, 380px);
      height: clamp(240px, 50vw, 380px);
      overflow: visible;
    }

    /* Sweep arm rotation */
    .sweep-group {
      transform-origin: 200px 200px;
      animation: sweep 4s linear infinite;
    }

    @keyframes sweep {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Blips: each positioned at a specific angle/radius.
       animation-delay syncs blip flash with sweep arm passing */
    .blip {
      animation: blip-flash 4s ease-out infinite;
      opacity: 0;
    }
    /* Blip at ~45deg (1/8 of 4s = 0.5s) */
    .blip-1 { animation-delay: 0.5s; }
    /* Blip at ~120deg (1/3 of 4s ~= 1.33s) */
    .blip-2 { animation-delay: 1.33s; }
    /* Blip at ~200deg (200/360 * 4 ~= 2.22s) */
    .blip-3 { animation-delay: 2.22s; }
    /* Blip at ~300deg (300/360 * 4 ~= 3.33s) */
    .blip-4 { animation-delay: 3.33s; }

    @keyframes blip-flash {
      0%   { opacity: 1; }
      40%  { opacity: 0.6; }
      100% { opacity: 0; }
    }

    .status-text {
      font-size: clamp(0.55rem, 1.2vw, 0.7rem);
      letter-spacing: 0.15em;
      color: #9ca3af;
      text-transform: uppercase;
      text-align: center;
    }

    .return-link {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #00d4ff;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s;
      z-index: 100;
      white-space: nowrap;
    }
    .return-link:hover { opacity: 1; }
    .return-link:focus {
      outline: 1px solid #00d4ff;
      outline-offset: 4px;
      opacity: 1;
    }

    @media (prefers-reduced-motion: reduce) {
      .sweep-group {
        animation: none;
        transform: rotate(0deg);
      }
      .blip {
        animation: none;
        opacity: 0.5;
      }
    }
  </style>
</head>
<body>
  <div class="radar-wrap">
    <svg class="radar-svg" viewBox="0 0 400 400" aria-label="Radar display showing no target acquired" role="img">
      <defs>
        <!-- Sweep wedge gradient: bright leading edge, trailing to transparent -->
        <linearGradient id="sweepGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
        </linearGradient>

        <!-- Radial fade mask for outer edge -->
        <radialGradient id="circleFade" cx="50%" cy="50%" r="50%">
          <stop offset="70%" stop-color="white" stop-opacity="1"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </radialGradient>
        <mask id="radarMask">
          <rect width="400" height="400" fill="url(#circleFade)"/>
        </mask>

        <!-- Drop shadow / glow filter for blips -->
        <filter id="blipGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="sweepGlow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- Concentric rings -->
      <circle cx="200" cy="200" r="40"  fill="none" stroke="rgba(0,212,255,0.12)" stroke-width="1"/>
      <circle cx="200" cy="200" r="80"  fill="none" stroke="rgba(0,212,255,0.12)" stroke-width="1"/>
      <circle cx="200" cy="200" r="120" fill="none" stroke="rgba(0,212,255,0.12)" stroke-width="1"/>
      <circle cx="200" cy="200" r="160" fill="none" stroke="rgba(0,212,255,0.12)" stroke-width="1"/>
      <circle cx="200" cy="200" r="190" fill="none" stroke="rgba(0,212,255,0.08)" stroke-width="1"/>

      <!-- Crosshair lines -->
      <line x1="200" y1="10"  x2="200" y2="390" stroke="rgba(0,212,255,0.08)" stroke-width="1"/>
      <line x1="10"  y1="200" x2="390" y2="200" stroke="rgba(0,212,255,0.08)" stroke-width="1"/>
      <!-- Diagonal crosshairs (lighter) -->
      <line x1="65"  y1="65"  x2="335" y2="335" stroke="rgba(0,212,255,0.04)" stroke-width="1"/>
      <line x1="335" y1="65"  x2="65"  y2="335" stroke="rgba(0,212,255,0.04)" stroke-width="1"/>

      <!-- Compass tick marks & labels -->
      <!-- N (top) -->
      <line x1="200" y1="8"  x2="200" y2="18"  stroke="rgba(0,212,255,0.4)" stroke-width="1.5"/>
      <text x="200" y="6" text-anchor="middle" dominant-baseline="auto" font-family="'Space Grotesk', sans-serif" font-size="9" fill="rgba(0,212,255,0.5)" letter-spacing="0">N</text>
      <!-- E (right) -->
      <line x1="382" y1="200" x2="392" y2="200" stroke="rgba(0,212,255,0.4)" stroke-width="1.5"/>
      <text x="398" y="204" text-anchor="start" font-family="'Space Grotesk', sans-serif" font-size="9" fill="rgba(0,212,255,0.5)">E</text>
      <!-- S (bottom) -->
      <line x1="200" y1="382" x2="200" y2="392" stroke="rgba(0,212,255,0.4)" stroke-width="1.5"/>
      <text x="200" y="400" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="9" fill="rgba(0,212,255,0.5)">S</text>
      <!-- W (left) -->
      <line x1="8"  y1="200" x2="18"  y2="200" stroke="rgba(0,212,255,0.4)" stroke-width="1.5"/>
      <text x="2" y="204" text-anchor="end" font-family="'Space Grotesk', sans-serif" font-size="9" fill="rgba(0,212,255,0.5)">W</text>

      <!-- Sweep group (rotates around center 200,200) -->
      <g class="sweep-group" filter="url(#sweepGlow)">
        <!-- Sweep wedge: ~30 deg arc path from center -->
        <!-- Path: M center, L to 12-o'clock edge, arc back 30deg CCW, Z -->
        <!-- At 0deg (pointing up), right edge is at 0, left at -30deg -->
        <!-- Arc: from (200, 10) rotating 30deg to the left point -->
        <!-- We draw a wedge from angle 0 to angle -30 (i.e. 330 deg) -->
        <!-- Point at 0deg up: (200, 10) -->
        <!-- Point at -30deg: center + 190*(sin(-30), -cos(-30)) = 200+190*(-0.5), 200+190*(-0.866) = 105, 35.5 -->
        <path
          d="M 200 200 L 200 10 A 190 190 0 0 0 105 35.5 Z"
          fill="url(#sweepGrad)"
          opacity="0.9"
        />
        <!-- Sweep arm line (leading edge) -->
        <line
          x1="200" y1="200"
          x2="200" y2="10"
          stroke="#00d4ff"
          stroke-width="1.5"
          opacity="0.7"
        />
      </g>

      <!-- Blip dots at fixed positions on the rings -->
      <!-- Blip 1: 45deg from top, r=120 => x=200+120*sin(45)=284.9, y=200-120*cos(45)=115.1 -->
      <circle class="blip blip-1" cx="284.9" cy="115.1" r="3.5"
        fill="#00d4ff"
        filter="url(#blipGlow)"
        aria-hidden="true"/>

      <!-- Blip 2: 120deg, r=80 => x=200+80*sin(120)=269.3, y=200-80*cos(120)=240 -->
      <circle class="blip blip-2" cx="269.3" cy="240" r="3"
        fill="#00d4ff"
        filter="url(#blipGlow)"
        aria-hidden="true"/>

      <!-- Blip 3: 200deg, r=160 => x=200+160*sin(200)=200+160*(-0.342)=145.3, y=200-160*cos(200)=200+150.4=350.4 -->
      <circle class="blip blip-3" cx="145.3" cy="350.4" r="4"
        fill="#00d4ff"
        filter="url(#blipGlow)"
        aria-hidden="true"/>

      <!-- Blip 4: 300deg, r=100 => x=200+100*sin(300)=200+100*(-0.866)=113.4, y=200-100*cos(300)=200-100*(0.5)=150 -->
      <circle class="blip blip-4" cx="113.4" cy="150" r="3"
        fill="#00d4ff"
        filter="url(#blipGlow)"
        aria-hidden="true"/>

      <!-- Center dot -->
      <circle cx="200" cy="200" r="3" fill="#00d4ff" opacity="0.6"/>

      <!-- Center text: TARGET NOT ACQUIRED -->
      <text
        x="200" y="212"
        text-anchor="middle"
        font-family="'Space Grotesk', sans-serif"
        font-size="8"
        font-weight="500"
        fill="#00d4ff"
        opacity="0.65"
        letter-spacing="2"
      >TARGET NOT ACQUIRED</text>
    </svg>

    <p class="status-text">ERROR 404 &mdash; SCAN COMPLETE &mdash; NO SIGNAL</p>
  </div>

  <a href="/" class="return-link">Return to Dashboard</a>
</body>
</html>
