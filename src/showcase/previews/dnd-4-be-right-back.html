<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Be Right Back — Do Not Disturb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #06060f;
      font-family: 'Space Grotesk', sans-serif;
      color: #f0f0f0;
    }
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #06060f;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .badge {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255, 107, 0, 0.3);
      background: rgba(255, 107, 0, 0.08);
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #ff6b00;
    }
    .badge .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #ff6b00;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    .card {
      width: min(440px, 88vw);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .pause-icon {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .pause-bar {
      width: 12px;
      height: 40px;
      background: #ff6b00;
      border-radius: 3px;
    }
    .heading {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ff6b00;
      margin-top: 24px;
      text-align: center;
    }
    .countdown {
      font-size: 1.8rem;
      font-weight: 700;
      color: #f0f0f0;
      font-variant-numeric: tabular-nums;
      margin-top: 20px;
    }
    .progress-track {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      margin-top: 16px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 100%;
      background: #ff6b00;
      border-radius: 3px;
      transition: width 1s linear;
    }
    .subheading {
      font-size: 0.75rem;
      font-weight: 300;
      color: #9ca3af;
      text-align: center;
      margin-top: 16px;
    }
    .divider {
      width: min(440px, 88vw);
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 24px 0;
    }
    .clock-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .clock-label {
      font-size: 0.55rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #9ca3af;
    }
    .clock-time {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
      color: #ff6b00;
    }
    .clock-zone {
      font-size: 0.6rem;
      font-weight: 400;
      color: #9ca3af;
      letter-spacing: 0.1em;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @media (max-width: 600px) {
      .card { padding: 32px 24px; }
      .countdown { font-size: 1.5rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      .badge .dot { animation: none; opacity: 1; }
      .progress-fill { transition: none; }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="badge">
      <span class="dot"></span>
      Paused
    </div>

    <div class="card">
      <div class="pause-icon">
        <div class="pause-bar"></div>
        <div class="pause-bar"></div>
      </div>

      <div class="heading">Be Right Back</div>

      <span class="countdown" id="countdown">15:00</span>

      <div class="progress-track">
        <div class="progress-fill" id="progressBar"></div>
      </div>

      <div class="subheading">Stepping away briefly. Back soon.</div>
    </div>

    <div class="divider"></div>

    <div class="clock-section">
      <span class="clock-label">Current Time (PST)</span>
      <span class="clock-time" id="focusClock">--:--:--</span>
      <span class="clock-zone">Pacific Standard Time</span>
    </div>
  </div>

  <script>
    (function() {
      var barEl = document.getElementById('progressBar');
      var countdownEl = document.getElementById('countdown');
      var clockEl = document.getElementById('focusClock');
      var startTime = Date.now();
      var duration = 900; // 15 minutes in seconds

      function update() {
        var elapsed = Math.floor((Date.now() - startTime) / 1000);
        var remaining = Math.max(0, duration - elapsed);
        var pct = (remaining / duration) * 100;
        barEl.style.width = pct + '%';
        var mins = Math.floor(remaining / 60);
        var secs = remaining % 60;
        countdownEl.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;

        var now = new Date();
        var time = now.toLocaleString('en-US', {
          timeZone: 'America/Los_Angeles',
          hour12: false,
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit'
        });
        clockEl.textContent = time;
      }

      update();
      setInterval(update, 1000);
    })();
  </script>
</body>
</html>
