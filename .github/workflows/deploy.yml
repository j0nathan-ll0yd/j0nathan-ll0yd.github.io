name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=human-datastream

  check-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check for new images
        id: check
        continue-on-error: true
        run: node scripts/fetch-images.mjs --check-only

      - name: Create issue for new images
        if: steps.check.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MISSING=$(cat missing-images.txt)
          gh issue create \
            --title "New images detected on CloudFront" \
            --body "$(cat <<EOF
          The deploy detected new images on CloudFront that are not yet committed to the repo.

          **Missing images:**
          \`\`\`
          ${MISSING}
          \`\`\`

          **To fix:**
          \`\`\`bash
          npm run fetch:images
          git add public/images/
          git commit -m "Add new optimized images from CloudFront"
          git push
          \`\`\`
          EOF
          )"
