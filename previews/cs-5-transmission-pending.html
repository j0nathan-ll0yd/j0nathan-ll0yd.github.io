<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transmission Pending — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #06060f;
      font-family: 'Space Grotesk', sans-serif;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }
    .transmission-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      border: 1px solid rgba(255, 0, 110, 0.25);
      border-radius: 999px;
      background: rgba(255, 0, 110, 0.06);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ff006e;
    }
    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ff006e;
      position: relative;
    }
    .live-dot::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 1px solid rgba(255, 0, 110, 0.4);
      animation: live-ring 2s ease-out infinite;
    }
    .name-block {
      text-align: center;
    }
    .name {
      font-size: clamp(2.2rem, 7vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      position: relative;
    }
    .name .glow-text {
      position: relative;
    }
    .name .glow-text::before {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: #ff006e;
      filter: blur(24px);
      opacity: 0.4;
      z-index: -1;
    }
    .name .last {
      color: #3a86ff;
    }
    .name .last::before {
      color: #3a86ff;
    }
    .subtitle {
      margin-top: 8px;
      font-size: 0.8rem;
      font-weight: 300;
      color: #9ca3af;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .waveform-label {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.55rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.2);
    }
    .waveform-label .line {
      width: 40px;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }
    .freq-readout {
      margin-top: 8px;
      font-size: 0.6rem;
      font-weight: 400;
      color: #9ca3af;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.1em;
    }
    @keyframes live-ring {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(2.5); opacity: 0; }
    }
    @media (max-width: 600px) {
      .content { gap: 20px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .live-dot::after { animation: none; opacity: 0.4; }
      canvas { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="waveCanvas"></canvas>
  <div class="content">
    <div class="transmission-badge">
      <span class="live-dot"></span>
      Incoming Transmission
    </div>
    <div class="name-block">
      <div class="name">
        <span class="glow-text" data-text="JONATHAN">JONATHAN</span>
        <span class="glow-text last" data-text=" LLOYD"> LLOYD</span>
      </div>
      <div class="subtitle">Software Engineer</div>
    </div>
    <div class="waveform-label">
      <span class="line"></span>
      Signal Active
      <span class="line"></span>
    </div>
    <div class="freq-readout" id="freqReadout">FREQ 147.300 MHz // SNR 42.8 dB</div>
  </div>
  <script>
    (function() {
      var canvas = document.getElementById('waveCanvas');
      var ctx = canvas.getContext('2d');
      var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      var time = 0;

      function drawWave(yCenter, amplitude, frequency, speed, color, lineWidth) {
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;
        for (var x = 0; x < canvas.width; x++) {
          var xNorm = x / canvas.width;
          // Fade edges
          var edgeFade = Math.sin(xNorm * Math.PI);
          var y = yCenter + Math.sin(x * frequency + time * speed) * amplitude * edgeFade;
          // Add secondary harmonic
          y += Math.sin(x * frequency * 2.3 + time * speed * 1.5) * amplitude * 0.3 * edgeFade;
          if (x === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
        }
        ctx.stroke();
      }

      function animate() {
        if (prefersReducedMotion) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        var cy = canvas.height * 0.5;

        // Primary wave (pink)
        drawWave(cy, 30, 0.02, 2, 'rgba(255, 0, 110, 0.25)', 1.5);
        // Secondary wave (blue)
        drawWave(cy, 20, 0.015, 1.5, 'rgba(58, 134, 255, 0.15)', 1);
        // Tertiary wave (pink, thinner)
        drawWave(cy + 2, 15, 0.025, 2.5, 'rgba(255, 0, 110, 0.1)', 0.5);

        time += 0.03;
        requestAnimationFrame(animate);
      }
      animate();

      // Frequency readout drift
      var freqEl = document.getElementById('freqReadout');
      function updateFreq() {
        var freq = (147.3 + (Math.random() - 0.5) * 0.05).toFixed(3);
        var snr = (42.8 + (Math.random() - 0.5) * 2).toFixed(1);
        freqEl.textContent = 'FREQ ' + freq + ' MHz // SNR ' + snr + ' dB';
      }
      setInterval(updateFreq, 3000);
    })();
  </script>
</body>
</html>
