<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coordinates Locked — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #06060f;
      font-family: 'Space Grotesk', sans-serif;
      color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .radar-container {
      position: relative;
      width: min(500px, 90vw);
      height: min(500px, 90vw);
    }
    /* Radar grid (CSS only) */
    .radar-grid {
      position: absolute;
      inset: 0;
    }
    .radar-ring {
      position: absolute;
      border: 1px solid rgba(6, 214, 160, 0.1);
      border-radius: 50%;
    }
    .radar-ring:nth-child(1) {
      inset: 10%;
    }
    .radar-ring:nth-child(2) {
      inset: 25%;
    }
    .radar-ring:nth-child(3) {
      inset: 40%;
    }
    .radar-crosshair-h {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(6, 214, 160, 0.08);
    }
    .radar-crosshair-v {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(6, 214, 160, 0.08);
    }
    /* Sweep */
    .radar-sweep {
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      overflow: hidden;
      animation: sweep-rotate 4s linear infinite;
    }
    .radar-sweep::after {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      width: 50%;
      height: 50%;
      transform-origin: bottom left;
      background: conic-gradient(from 0deg, transparent, rgba(6, 214, 160, 0.15));
    }
    /* Pulse rings */
    .pulse-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(6, 214, 160, 0.4);
      border-radius: 50%;
      animation: pulse-expand 3s ease-out infinite;
    }
    .pulse-ring:nth-child(1) { animation-delay: 0s; }
    .pulse-ring:nth-child(2) { animation-delay: 1s; }
    .pulse-ring:nth-child(3) { animation-delay: 2s; }
    /* Center crosshair */
    .crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 24px;
      height: 24px;
    }
    .crosshair::before, .crosshair::after {
      content: '';
      position: absolute;
      background: #06d6a0;
    }
    .crosshair::before {
      top: 0; bottom: 0; left: 50%;
      width: 1px;
      transform: translateX(-0.5px);
    }
    .crosshair::after {
      left: 0; right: 0; top: 50%;
      height: 1px;
      transform: translateY(-0.5px);
    }
    .crosshair-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #06d6a0;
      box-shadow: 0 0 12px rgba(6, 214, 160, 0.8);
    }
    /* Data card */
    .data-card {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(6, 214, 160, 0.15);
      border-radius: 12px;
      backdrop-filter: blur(16px);
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      min-width: 280px;
      opacity: 0;
      transform: translateX(-50%) translateY(10px);
    }
    .data-card.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .data-card-label {
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #06d6a0;
    }
    .data-card-name {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }
    .data-card-coords {
      font-size: 0.65rem;
      font-weight: 400;
      color: #9ca3af;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
    }
    .pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .pill {
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .pill-green {
      background: rgba(6, 214, 160, 0.1);
      border: 1px solid rgba(6, 214, 160, 0.25);
      color: #06d6a0;
    }
    .pill-blue {
      background: rgba(58, 134, 255, 0.1);
      border: 1px solid rgba(58, 134, 255, 0.25);
      color: #3a86ff;
    }
    .pill-pink {
      background: rgba(255, 0, 110, 0.1);
      border: 1px solid rgba(255, 0, 110, 0.25);
      color: #ff006e;
    }
    /* Corner HUD elements */
    .hud-corner {
      position: fixed;
      font-size: 0.5rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(6, 214, 160, 0.3);
      font-variant-numeric: tabular-nums;
    }
    .hud-tl { top: 16px; left: 16px; }
    .hud-tr { top: 16px; right: 16px; }
    .hud-bl { bottom: 16px; left: 16px; }

    @keyframes sweep-rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes pulse-expand {
      0% { width: 10px; height: 10px; opacity: 0.6; }
      100% { width: 200px; height: 200px; opacity: 0; }
    }
    @media (max-width: 600px) {
      .data-card { min-width: 0; width: 85vw; padding: 16px 20px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .radar-sweep { animation: none; }
      .pulse-ring { animation: none; opacity: 0; }
      .data-card { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>
  <div class="hud-corner hud-tl">GRID ONLINE</div>
  <div class="hud-corner hud-tr" id="hudTime"></div>
  <div class="hud-corner hud-bl">SECTOR 7G</div>

  <div class="radar-container">
    <div class="radar-grid">
      <div class="radar-ring"></div>
      <div class="radar-ring"></div>
      <div class="radar-ring"></div>
      <div class="radar-crosshair-h"></div>
      <div class="radar-crosshair-v"></div>
    </div>
    <div class="radar-sweep"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="crosshair">
      <div class="crosshair-dot"></div>
    </div>
    <div class="data-card" id="dataCard">
      <div class="data-card-label">Target Acquired</div>
      <div class="data-card-name">Jonathan Lloyd</div>
      <div class="data-card-coords" id="coords">37.7749° N, 122.4194° W</div>
      <div class="pills">
        <span class="pill pill-green">Engineer</span>
        <span class="pill pill-blue">Builder</span>
        <span class="pill pill-pink">Creator</span>
      </div>
    </div>
  </div>
  <script>
    (function() {
      var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      // Show data card after delay
      var dataCard = document.getElementById('dataCard');
      if (!prefersReducedMotion) {
        setTimeout(function() {
          dataCard.classList.add('show');
        }, 2000);
      } else {
        dataCard.classList.add('show');
      }

      // HUD clock
      var hudTime = document.getElementById('hudTime');
      function updateHudTime() {
        var now = new Date();
        var h = now.getHours();
        var m = now.getMinutes();
        var s = now.getSeconds();
        hudTime.textContent =
          (h < 10 ? '0' : '') + h + ':' +
          (m < 10 ? '0' : '') + m + ':' +
          (s < 10 ? '0' : '') + s + ' UTC';
      }
      updateHudTime();
      setInterval(updateHudTime, 1000);

      // Subtle coordinate drift
      var coordsEl = document.getElementById('coords');
      var baseLat = 37.7749;
      var baseLng = 122.4194;
      function driftCoords() {
        var lat = baseLat + (Math.random() - 0.5) * 0.0002;
        var lng = baseLng + (Math.random() - 0.5) * 0.0002;
        coordsEl.textContent = lat.toFixed(4) + '\u00B0 N, ' + lng.toFixed(4) + '\u00B0 W';
      }
      if (!prefersReducedMotion) {
        setInterval(driftCoords, 2000);
      }
    })();
  </script>
</body>
</html>
