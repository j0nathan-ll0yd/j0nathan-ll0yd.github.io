<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Station Offline — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #06060f;
      font-family: 'Space Grotesk', sans-serif;
      color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 40px;
    }
    .indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
      animation: breathe 4s ease-in-out infinite;
    }
    .offline-text {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.06);
      position: relative;
    }
    .offline-text::after {
      content: 'OFFLINE';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.03) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 28px 36px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: min(420px, 88vw);
    }
    .card-name {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .card-divider {
      width: 40px;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
    }
    .card-message {
      font-size: 0.75rem;
      font-weight: 300;
      color: #9ca3af;
      line-height: 1.6;
    }
    .card-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.55rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.2);
    }
    .card-footer .mini-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(239, 68, 68, 0.5);
    }
    @keyframes breathe {
      0%, 100% { opacity: 1; box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
      50% { opacity: 0.3; box-shadow: 0 0 8px rgba(239, 68, 68, 0.2); }
    }
    @media (prefers-reduced-motion: reduce) {
      .indicator { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="indicator"></div>
  <div class="offline-text">OFFLINE</div>
  <div class="card">
    <div class="card-name">Jonathan Lloyd</div>
    <div class="card-divider"></div>
    <div class="card-message">
      The dashboard is being constructed. A new experience is taking shape behind the scenes.
    </div>
    <div class="card-footer">
      <span class="mini-dot"></span>
      Check back soon
    </div>
  </div>
</body>
</html>
