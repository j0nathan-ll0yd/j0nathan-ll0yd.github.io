<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boot Sequence — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #06060f;
      font-family: 'Space Grotesk', sans-serif;
      color: #f0f0f0;
      display: flex;
    }
    .left-panel {
      width: 280px;
      min-width: 280px;
      border-right: 1px solid rgba(255, 0, 110, 0.2);
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      background: rgba(255, 255, 255, 0.02);
    }
    .identity {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .avatar-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid rgba(58, 134, 255, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: ring-pulse 3s ease-in-out infinite;
    }
    .avatar-inner {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255, 0, 110, 0.2), rgba(58, 134, 255, 0.2));
    }
    .identity-name {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .identity-title {
      font-size: 0.65rem;
      color: #9ca3af;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .nav-items {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .nav-item {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 500;
      color: #9ca3af;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid transparent;
      opacity: 0;
      transform: translateX(-10px);
    }
    .nav-item.loaded {
      opacity: 1;
      transform: translateX(0);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .nav-item.active {
      background: rgba(58, 134, 255, 0.08);
      border-color: rgba(58, 134, 255, 0.2);
      color: #3a86ff;
    }
    .right-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .terminal {
      width: min(560px, 85vw);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      overflow: hidden;
    }
    .terminal-header {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .terminal-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .terminal-dot.red { background: #ef4444; }
    .terminal-dot.amber { background: #f59e0b; }
    .terminal-dot.green { background: #06d6a0; }
    .terminal-title {
      flex: 1;
      text-align: center;
      font-size: 0.6rem;
      color: #9ca3af;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .terminal-body {
      padding: 20px;
      min-height: 280px;
      font-size: 0.72rem;
      line-height: 1.8;
    }
    .log-line {
      opacity: 0;
      white-space: nowrap;
    }
    .log-line.visible {
      opacity: 1;
      transition: opacity 0.15s ease;
    }
    .log-prefix {
      color: #06d6a0;
      margin-right: 8px;
    }
    .log-info { color: #3a86ff; }
    .log-success { color: #06d6a0; }
    .log-warn { color: #f59e0b; }
    .log-dim { color: #9ca3af; }
    .cursor {
      display: inline-block;
      width: 7px;
      height: 14px;
      background: #06d6a0;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }
    .ready-banner {
      margin-top: 20px;
      padding: 12px 24px;
      border: 1px solid rgba(6, 214, 160, 0.3);
      border-radius: 8px;
      background: rgba(6, 214, 160, 0.06);
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: #06d6a0;
      opacity: 0;
      transform: translateY(8px);
    }
    .ready-banner.show {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    @keyframes ring-pulse {
      0%, 100% { border-color: rgba(58, 134, 255, 0.4); }
      50% { border-color: rgba(58, 134, 255, 0.15); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @media (max-width: 768px) {
      .left-panel { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      .avatar-ring { animation: none; }
      .cursor { animation: none; opacity: 1; }
      .nav-item { opacity: 1; transform: none; }
      .log-line { opacity: 1; }
      .ready-banner { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <div class="left-panel">
    <div class="identity">
      <div class="avatar-ring"><div class="avatar-inner"></div></div>
      <div class="identity-name">Jonathan Lloyd</div>
      <div class="identity-title">Software Engineer</div>
    </div>
    <div class="nav-items" id="navItems">
      <div class="nav-item" data-delay="2200">HEALTH METRICS</div>
      <div class="nav-item" data-delay="3000">GITHUB ACTIVITY</div>
      <div class="nav-item" data-delay="3800">BOOKSHELF</div>
      <div class="nav-item" data-delay="4600">READING FEED</div>
      <div class="nav-item" data-delay="5400">SYSTEM STATUS</div>
    </div>
  </div>
  <div class="right-panel">
    <div class="terminal">
      <div class="terminal-header">
        <div class="terminal-dot red"></div>
        <div class="terminal-dot amber"></div>
        <div class="terminal-dot green"></div>
        <div class="terminal-title">System Boot</div>
      </div>
      <div class="terminal-body" id="terminalBody"></div>
    </div>
  </div>
  <script>
    (function() {
      var lines = [
        { text: 'Initializing command center...', cls: 'log-dim' },
        { text: 'Loading design tokens', cls: 'log-info', dots: true },
        { text: 'OK', cls: 'log-success', inline: true },
        { text: 'Mounting layout grid', cls: 'log-info', dots: true },
        { text: 'OK', cls: 'log-success', inline: true },
        { text: 'Connecting data feeds', cls: 'log-info', dots: true },
        { text: 'OK', cls: 'log-success', inline: true },
        { text: 'Verifying health metrics  ......  LINKED', cls: 'log-success' },
        { text: 'Verifying GitHub feed     ......  LINKED', cls: 'log-success' },
        { text: 'Verifying bookshelf       ......  LINKED', cls: 'log-success' },
        { text: 'Verifying RSS feed        ......  LINKED', cls: 'log-success' },
        { text: 'Compiling glass shaders', cls: 'log-info', dots: true },
        { text: 'OK', cls: 'log-success', inline: true },
        { text: 'Particle system online', cls: 'log-success' },
        { text: '', cls: 'log-dim' },
        { text: 'All systems nominal.', cls: 'log-success', final: true }
      ];

      var body = document.getElementById('terminalBody');
      var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var currentLine = null;
      var lineIndex = 0;

      function addLine(line) {
        if (line.inline && currentLine) {
          currentLine.innerHTML += ' <span class="' + line.cls + '">' + line.text + '</span>';
          return;
        }
        var el = document.createElement('div');
        el.className = 'log-line';
        var content = '<span class="log-prefix">&gt;</span>';
        if (line.dots) {
          content += '<span class="' + line.cls + '">' + line.text + '</span>';
        } else {
          content += '<span class="' + line.cls + '">' + line.text + '</span>';
        }
        el.innerHTML = content;
        body.appendChild(el);
        currentLine = el;

        if (prefersReducedMotion) {
          el.classList.add('visible');
        } else {
          setTimeout(function() { el.classList.add('visible'); }, 50);
        }
      }

      function processLines() {
        if (lineIndex >= lines.length) {
          // Add cursor to last line
          if (currentLine) {
            currentLine.innerHTML += '<span class="cursor"></span>';
          }
          // Show ready banner
          var banner = document.createElement('div');
          banner.className = 'ready-banner';
          banner.textContent = 'SYSTEM READY — LAUNCHING SOON';
          body.appendChild(banner);
          setTimeout(function() { banner.classList.add('show'); }, 300);
          return;
        }
        addLine(lines[lineIndex]);
        lineIndex++;
        var delay = lines[lineIndex - 1].inline ? 400 : (Math.random() * 300 + 200);
        if (lines[lineIndex - 1].final) delay = 600;
        setTimeout(processLines, delay);
      }

      if (prefersReducedMotion) {
        for (var i = 0; i < lines.length; i++) {
          addLine(lines[i]);
        }
      } else {
        setTimeout(processLines, 800);
      }

      // Animate nav items
      var navItems = document.querySelectorAll('.nav-item');
      for (var n = 0; n < navItems.length; n++) {
        (function(item) {
          var delay = parseInt(item.getAttribute('data-delay'), 10);
          setTimeout(function() {
            item.classList.add('loaded');
          }, delay);
        })(navItems[n]);
      }
    })();
  </script>
</body>
</html>
