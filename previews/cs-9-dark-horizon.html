<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Horizon — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #06060f;
      font-family: 'Space Grotesk', sans-serif;
      color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    /* Horizon line with glow */
    .horizon {
      position: fixed;
      top: 55%;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(58, 134, 255, 0.15);
    }
    .horizon::before {
      content: '';
      position: absolute;
      top: -40px;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(180deg,
        transparent 0%,
        rgba(168, 85, 247, 0.03) 35%,
        rgba(58, 134, 255, 0.06) 50%,
        rgba(255, 0, 110, 0.03) 65%,
        transparent 100%
      );
    }
    /* Atmospheric gradient above horizon */
    .atmosphere {
      position: fixed;
      inset: 0;
      background: radial-gradient(
        ellipse 120% 50% at 50% 55%,
        rgba(58, 134, 255, 0.04) 0%,
        transparent 70%
      );
      pointer-events: none;
    }
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      margin-top: -10vh;
    }
    .name {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-align: center;
      color: rgba(255, 255, 255, 0.9);
    }
    .role {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #9ca3af;
    }
    .spacer {
      width: 32px;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }
    .tagline {
      font-size: 0.85rem;
      font-weight: 300;
      color: #9ca3af;
      letter-spacing: 0.06em;
    }
    .tagline em {
      font-style: normal;
      color: #3a86ff;
    }
    /* Bottom section below horizon */
    .bottom-info {
      position: fixed;
      bottom: 10vh;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 1;
    }
    .bottom-label {
      font-size: 0.55rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.15);
    }
    .bottom-year {
      font-size: 0.9rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.25);
      font-variant-numeric: tabular-nums;
    }
    @media (prefers-reduced-motion: reduce) {
      /* Static design — nothing to disable */
    }
  </style>
</head>
<body>
  <div class="atmosphere"></div>
  <div class="horizon"></div>
  <div class="content">
    <div class="name">JONATHAN LLOYD</div>
    <div class="role">Software Engineer</div>
    <div class="spacer"></div>
    <div class="tagline">Something is on the <em>horizon</em>.</div>
  </div>
  <div class="bottom-info">
    <div class="bottom-label">Coming Soon</div>
    <div class="bottom-year" id="yearLabel"></div>
  </div>
  <script>
    (function() {
      document.getElementById('yearLabel').textContent = new Date().getFullYear();
    })();
  </script>
</body>
</html>
